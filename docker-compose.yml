# AI Creative Workspace — single-command boot (NFR-3, design 15.2)
services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me-please-very-long-secret}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./data:/app/data # SQLite + media persistence (design 15.3)
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
      - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Optional offline LLM (NFR-8). Enable with: docker compose --profile offline up
  ollama:
    image: ollama/ollama:latest
    profiles: ["offline"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
