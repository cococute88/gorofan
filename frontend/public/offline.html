<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인 — AI Creative Workspace</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #faf9fb;
        color: #1c1917;
        padding: 1.5rem;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0c0a12; color: #f5f5f4; }
        .muted { color: #a1a1aa !important; }
      }
      .badge {
        width: 56px; height: 56px; border-radius: 16px;
        background: rgba(124, 58, 237, 0.12);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1rem; font-size: 28px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
      p { margin: 0 0 1.25rem; }
      .muted { color: #71717a; font-size: .9rem; }
      button {
        border: 0; border-radius: 10px; padding: .6rem 1.25rem;
        background: #7c3aed; color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">✦</div>
      <h1>오프라인 상태예요</h1>
      <p class="muted">
        인터넷 연결이 끊겼어요.<br />
        다시 연결되면 이어서 창작을 계속할 수 있어요.
      </p>
      <button onclick="location.reload()">다시 시도</button>
    </main>
  </body>
</html>
